name: cleanup-v0.8.3-hotfix

on:
  push:
    branches:
      - agent/v0.8.3-hotfix
    paths:
      - .github/workflows/apply-v0.8.3-hotfix.yml
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: cleanup-v0.8.3-hotfix
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'agent/v0.8.3-hotfix')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.8.3-hotfix
          fetch-depth: 0

      - name: Remove generated artifacts and add ignore rules
        run: |
          git rm -r --ignore-unmatch \
            src/riskradar.egg-info \
            src/riskradar/__pycache__ \
            tests/__pycache__ \
            pytest-output.txt \
            HOTFIX_TEST_FAILURE.txt
          rm -rf .pytest_cache
          cat > .gitignore <<'EOF'
          __pycache__/
          *.py[cod]
          *.egg-info/
          .pytest_cache/
          pytest-output.txt
          HOTFIX_TEST_FAILURE.txt
          _cache/
          EOF

      - name: Verify generated files are not tracked
        run: |
          if git ls-files | grep -E '(^|/)(__pycache__|.*\.egg-info)(/|$)|\.pyc$|(^|/)pytest-output\.txt$|(^|/)HOTFIX_TEST_FAILURE\.txt$'; then
            echo 'Generated artifacts are still tracked.'
            exit 1
          fi

      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .gitignore
          git add -u
          git commit -m 'Remove generated files from v0.8.3 hotfix'
          git push origin HEAD:agent/v0.8.3-hotfix
