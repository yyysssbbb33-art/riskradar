name: test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "agent/**"
      - "codex/**"
      - "codex-*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Repository hygiene
        run: |
          tracked_generated="$(git ls-files | grep -E '(^|/)(__pycache__|.*\.egg-info)(/|$)|\.pyc$|(^|/)pytest-output\.txt$|(^|/)HOTFIX_TEST_FAILURE\.txt$' || true)"
          if [ -n "$tracked_generated" ]; then
            echo "Generated artifacts must not be committed:"
            echo "$tracked_generated"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[ui,dev]"

      - name: Test
        run: pytest -q

      - name: Gradio smoke
        run: |
          python - <<'PY'
          from riskradar.ui import build_app
          app = build_app()
          assert type(app).__name__ == "Blocks"
          print(type(app).__name__)
          PY
