name: apply-v0.8.4-restore

on:
  push:
    branches:
      - agent/v0.8.4-restore-credit-rate-depth
    paths:
      - scripts/apply_v0_8_4_restore.py
      - .github/workflows/apply-v0.8.4-restore.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apply-v0.8.4-restore
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.8.4-restore-credit-rate-depth
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply restoration
        run: python scripts/apply_v0_8_4_restore.py

      - name: Install
        run: pip install -e '.[ui,dev]'

      - name: Full test suite
        run: pytest -q

      - name: Gradio smoke
        run: |
          python - <<'PY'
          from riskradar.ui import build_app
          app = build_app()
          assert type(app).__name__ == 'Blocks'
          print(type(app).__name__)
          PY

      - name: Commit validated restoration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            README.md \
            pyproject.toml \
            src/riskradar/version.py \
            src/riskradar/ui.py \
            src/riskradar/context_view.py \
            tests/test_credit_rate_depth.py
          git commit -m 'Restore credit and rate context depth for v0.8.4'
          git push origin HEAD:agent/v0.8.4-restore-credit-rate-depth
